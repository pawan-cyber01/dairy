<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Dairy Garden</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <div id="login-overlay" style="position: fixed; inset: 0; background: var(--bg-color); z-index: 9999; display: flex; align-items: center; justify-content: center;">
        <div style="background: var(--surface-color); padding: 48px; border-radius: var(--radius-lg); border: 1px solid var(--border-color); text-align: center; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.05);">
            <h2 style="margin-bottom: 8px; font-family: var(--font-serif); color: var(--brand-color); font-size: 2rem;">Secure Access</h2>
            <p style="color: var(--text-secondary); margin-bottom: 32px;">Enter your admin credentials.</p>
            
            <div id="admin-error" style="color: var(--error-color); margin-bottom: 16px; display: none; font-weight: 500;"></div>
            <div id="lockout-timer" style="color: var(--error-color); margin-bottom: 16px; display: none; font-weight: bold; font-size: 1.2rem;"></div>

            <!-- Step 1: ID & Password -->
            <form id="step-1-form" style="text-align: left;">
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem;">Admin ID</label>
                    <input type="text" id="admin-id" required style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: var(--radius-sm);">
                </div>
                <div style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem;">Password</label>
                    <input type="password" id="admin-pass" required style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: var(--radius-sm);">
                </div>
                <button type="submit" id="step-1-btn" style="width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: 0.3s;">
                    Verify Credentials
                </button>
            </form>

            <!-- Step 2: PIN (Hidden initially) -->
            <form id="step-2-form" style="text-align: left; display: none;">
                <p style="text-align: center; color: var(--brand-color); font-weight: 600; margin-bottom: 16px;">Credentials Verified</p>
                <div style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem;">6-Digit Security PIN</label>
                    <input type="password" id="admin-pin" required maxlength="6" pattern="[0-9]{6}" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); letter-spacing: 4px; font-size: 1.2rem; text-align: center;">
                </div>
                <button type="submit" id="step-2-btn" style="width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer;">
                    Authorize Access
                </button>
                <button type="button" id="btn-back-login" style="width: 100%; padding: 14px; background: transparent; color: var(--text-secondary); border: none; font-weight: 500; cursor: pointer; margin-top: 8px;">
                    Cancel
                </button>
            </form>
        </div>
    </div>

    <div class="admin-layout" id="admin-content" style="display: none;">
        <aside class="admin-sidebar" id="admin-sidebar">
            <a href="index.html" class="admin-logo">
                <img src="../logo.png" alt="Logo" style="height: 32px;">
                Dairy Garden Admin
            </a>
            <nav class="admin-nav">
                <a href="index.html" class="admin-nav-item active">📊 Dashboard</a>
                <a href="orders.html" class="admin-nav-item">🛒 Orders</a>
                <a href="products.html" class="admin-nav-item">📦 Products</a>
                <a href="settings.html" class="admin-nav-item">⚙️ Settings</a>
            </nav>
            <div style="padding: 24px; border-top: 1px solid var(--border-color);">
                <button id="admin-logout-btn" class="btn-outline" style="width: 100%; padding: 8px; font-size: 0.9rem;">Sign Out</button>
            </div>
        </aside>

        <main class="admin-main">
            <div class="mobile-header">
                <img src="../logo.png" alt="Logo" style="height: 32px;">
                <button class="mobile-menu-btn" onclick="document.getElementById('admin-sidebar').classList.toggle('open')">☰</button>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                <h1 style="font-size: 2rem; font-family: var(--font-sans);">Overview</h1>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-title">Total Revenue</div>
                    <div class="stat-value" id="stat-revenue">₹0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Total Orders</div>
                    <div class="stat-value" id="stat-orders">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Products</div>
                    <div class="stat-value" id="stat-products">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Low Stock Alerts</div>
                    <div class="stat-value" id="stat-alerts" style="color: var(--error-color);">0</div>
                </div>
            </div>

            <div style="background: var(--surface-color); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px;">
                <h3 style="margin-bottom: 24px;">Recent Orders</h3>
                <div id="recent-orders-list">
                    <p style="color: var(--text-secondary);">Loading...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
